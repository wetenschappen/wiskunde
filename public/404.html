<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doorverwijzen...</title>
  <script>
    // GitHub Pages SPA redirect: preserve the path as a hash fragment
    var segments = window.location.pathname.replace('/wiskunde/', '').split('/').filter(Boolean)
    if (segments.length > 0) {
      window.location.replace('/wiskunde/#!/' + segments.join('/'))
    } else {
      window.location.replace('/wiskunde/')
    }
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0;url=/wiskunde/" />
  </noscript>
</head>
<body>
  <p>Doorverwijzen naar de app...</p>
  <p><a href="/wiskunde/">Klik hier als u niet automatisch wordt doorgestuurd.</a></p>
</body>
</html>
